name: kite

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker-compose/Dockerfile
    image: ${KITE_IMAGE:-kite:local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      KITE_ENV_FILE: /app/config/kite.env
      AUTH_TRUST_HOST: "true"
      KITE_DYNAMIC_AUTH_URL: "true"
    ports:
      - "${KITE_PORT:-3000}:3000"
    volumes:
      - type: bind
        source: ./data
        target: /app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
